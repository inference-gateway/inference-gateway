{{- if .Values.gateway.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "inference-gateway.fullname" . }}
  labels:
    {{- include "inference-gateway.labels" . | nindent 4 }}
  {{- with .Values.gateway.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- if .Values.gateway.httpRoute.parentRefs }}
    {{- toYaml .Values.gateway.httpRoute.parentRefs | nindent 4 }}
    {{- else }}
    - name: {{ include "inference-gateway.fullname" . }}
      {{- with .Values.gateway.httpRoute.sectionName }}
      sectionName: {{ . | quote }}
      {{- end }}
    {{- end }}
  {{- with .Values.gateway.httpRoute.hostnames }}
  hostnames:
    {{- range . }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
  rules:
    {{- if .Values.gateway.httpRoute.rules }}
    {{- toYaml .Values.gateway.httpRoute.rules | nindent 4 }}
    {{- else }}
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "inference-gateway.fullname" . }}
          port: {{ .Values.service.port }}
    {{- end }}
{{- end }}
